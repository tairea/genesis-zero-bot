<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d5a27">
    <meta name="description" content="RegenHub - A trust-minimized PWA starter">
    <title>RegenHub</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <style>
        :root {
            --bg: #1a1a1a;
            --surface: #2a2a2a;
            --text: #e8e8e8;
            --text-muted: #999;
            --accent: #4a9c3d;
            --accent-hover: #5cb848;
            --danger: #c44;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 1rem;
        }

        main {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 2rem 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 0.75rem;
        }

        .status-badge.online {
            background: rgba(74, 156, 61, 0.2);
            color: var(--accent-hover);
        }

        .status-badge.offline {
            background: rgba(204, 68, 68, 0.2);
            color: var(--danger);
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin: 1rem 0;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            color: var(--accent-hover);
        }

        .card ul {
            list-style: none;
        }

        .card li {
            padding: 0.35rem 0;
        }

        .counter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 1rem 0;
        }

        .counter button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .counter button:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .count {
            font-size: 2.5rem;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer .small {
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        /* PWA installability hints */
        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>
    <!-- This div is where your Rust app will mount -->
    <div id="app"></div>
    <script type="module">
        import init from '/pkg/package.js';
        init();

        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
