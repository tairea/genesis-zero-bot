<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Regen Tribe - Interactive Highlight</title>
  <style>
    body { margin: 0; background: #0d1117; }
    #graph { width: 100vw; height: 100vh; }
    #info {
      position: absolute; top: 20px; left: 20px;
      color: #fff; font-family: monospace;
      background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px;
    }
  </style>
  <script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>
</head>
<body>
  <div id="graph"></div>
  <div id="info">Hover over nodes to highlight connections</div>
  <script>
    const DATA_URL = '../data/regen-tribe.json';
    
    let highlightNodes = new Set();
    let highlightLinks = new Set();
    let hoverNode = null;
    
    const Graph = new ForceGraph3D(document.getElementById('graph'))
        .jsonUrl(DATA_URL)
        .nodeAutoColorBy('group')
        .nodeColor(node => highlightNodes.has(node) ? 
          (node === hoverNode ? 'rgb(255,0,0)' : 'rgba(255,160,0,0.8)') : 
          'rgba(0,255,255,0.6)')
        .linkWidth(link => highlightLinks.has(link) ? 4 : 1)
        .linkDirectionalParticles(link => highlightLinks.has(link) ? 4 : 0)
        .linkDirectionalParticleWidth(4)
        .linkDirectionalParticleSpeed(0.006)
        .onNodeHover(node => {
          if ((!node && !highlightNodes.size) || (node && hoverNode === node)) return;
          highlightNodes.clear();
          highlightLinks.clear();
          if (node) {
            highlightNodes.add(node);
            // Find neighbors
            Graph.graphData().links.forEach(l => {
              if (l.source.id === node.id) {
                highlightNodes.add(l.target);
                highlightLinks.add(l);
              } else if (l.target.id === node.id) {
                highlightNodes.add(l.source);
                highlightLinks.add(l);
              }
            });
          }
          hoverNode = node || null;
          updateHighlight();
        })
        .onLinkHover(link => {
          highlightNodes.clear();
          highlightLinks.clear();
          if (link) {
            highlightLinks.add(link);
            highlightNodes.add(link.source);
            highlightNodes.add(link.target);
          }
          updateHighlight();
        });
    
    function updateHighlight() {
      Graph
        .nodeColor(Graph.nodeColor())
        .linkWidth(Graph.linkWidth())
        .linkDirectionalParticles(Graph.linkDirectionalParticles());
    }
  </script>
</body>
</html>
