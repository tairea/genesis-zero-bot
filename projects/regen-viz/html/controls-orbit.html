<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Regen Tribe - Orbit Controls</title>
  <style>
    body { margin: 0; background: #0d1117; }
    #graph { width: 100vw; height: 100vh; }
  </style>
  <script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>
</head>
<body>
  <div id="graph"></div>
  <script>
    const DATA_URL = '../data/regen-tribe.json';
    
    const Graph = new ForceGraph3D(document.getElementById('graph'))
        .jsonUrl(DATA_URL)
        .nodeAutoColorBy('group')
        .backgroundColor('#0d1117')
        .d3Force('charge', null)
        .d3Force('link', null)
        .d3Force('center', null)
        .d3VelocityDecay(0)
        .onEngineStop(() => Graph.zoomToFit(400));
  </script>
</body>
</html>
