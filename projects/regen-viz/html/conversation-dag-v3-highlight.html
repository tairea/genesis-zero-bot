<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Conversation DAG - Interactive Highlight</title>
  <style>
    body { margin: 0; background: #101020; overflow: hidden; }
    #graph { width: 100vw; height: 100vh; }
    #info {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px;
      font-family: monospace; font-size: 12px; color: #8b949e;
      border: 1px solid #30363d;
    }
    h3 { margin: 0 0 10px 0; color: #58a6ff; font-size: 14px; }
    .hint { color: #666; font-size: 10px; margin-top: 8px; }
  </style>
  <script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>
</head>
<body>
  <div id="graph"></div>
  <div id="info">
    <h3>🔍 Interactive Highlight</h3>
    <div>Hover over nodes to highlight connections</div>
    <div class="hint">Neighbors and links illuminate on hover</div>
  </div>
  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    
    // Load and prepare data
    const rawData = await fetch('../data/unified/conversation-dag.json').then(r => r.json());
    
    // Build neighbor relationships
    rawData.nodes.forEach(node => {
      node.neighbors = [];
      node.links = [];
    });
    
    rawData.links.forEach(link => {
      const source = rawData.nodes.find(n => n.id === link.source);
      const target = rawData.nodes.find(n => n.id === link.target);
      if (source && target) {
        source.neighbors.push(target);
        target.neighbors.push(source);
        source.links.push(link);
        target.links.push(link);
      }
    });
    
    const highlightNodes = new Set();
    const highlightLinks = new Set();
    let hoverNode = null;
    
    const Graph = new ForceGraph3D(document.getElementById('graph'))
      .graphData(rawData)
      .backgroundColor('#101020')
      .nodeColor(node => {
        if (highlightNodes.has(node)) {
          return node === hoverNode ? 'rgb(255,0,0)' : 'rgba(255,160,0,0.9)';
        }
        return node.color || 'rgba(0,255,255,0.6)';
      })
      .nodeLabel('label')
      .nodeRelSize(6)
      .linkWidth(link => highlightLinks.has(link) ? 4 : 1)
      .linkDirectionalParticles(link => highlightLinks.has(link) ? 4 : 0)
      .linkDirectionalParticleWidth(4)
      .linkColor(() => 'rgba(255,255,255,0.2)')
      .onNodeHover(node => {
        if ((!node && !highlightNodes.size) || (node && hoverNode === node)) return;
        
        highlightNodes.clear();
        highlightLinks.clear();
        
        if (node) {
          highlightNodes.add(node);
          node.neighbors.forEach(neighbor => highlightNodes.add(neighbor));
          node.links.forEach(link => highlightLinks.add(link));
        }
        
        hoverNode = node || null;
        
        // Update highlight
        Graph.nodeColor(Graph.nodeColor())
             .linkWidth(Graph.linkWidth())
             .linkDirectionalParticles(Graph.linkDirectionalParticles());
      })
      .onLinkHover(link => {
        highlightNodes.clear();
        highlightLinks.clear();
        
        if (link) {
          highlightLinks.add(link);
          highlightNodes.add(link.source);
          highlightNodes.add(link.target);
        }
        
        Graph.nodeColor(Graph.nodeColor())
             .linkWidth(Graph.linkWidth())
             .linkDirectionalParticles(Graph.linkDirectionalParticles());
      });
  </script>
</body>
</html>
