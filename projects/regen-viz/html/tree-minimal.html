<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tree of Civilization - Minimal</title>
  <style>
    body { margin: 0; background: #000000; overflow: hidden; }
    #graph { width: 100vw; height: 100vh; }
    #title {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 4px;
      opacity: 0.6;
    }
  </style>
  <script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>
</head>
<body>
  <div id="graph"></div>
  <div id="title">TREE OF CIVILIZATION</div>
  <script>
    const Graph = new ForceGraph3D(document.getElementById('graph'))
      .jsonUrl('../data/unified/tree-of-civilization.json')
      .nodeAutoColorBy('group')
      .nodeLabel(d => d.label)
      .linkColor(() => '#333333')
      .linkWidth(1)
      .backgroundColor('#000000')
      .nodeRelSize(6)
      .nodeOpacity(0.9)
      .linkOpacity(0.4)
      .onNodeClick(node => {
        // Focus on clicked node
        Graph.graphData().nodes.forEach(n => n.val = n.id === node.id ? 25 : 6);
        Graph.nodeRelSize(n => n.val * 0.25);
      });
  </script>
</body>
</html>
