<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tree of Civilization</title>
  <style>
    body { margin: 0; background: #000000; overflow: hidden; }
    #graph { width: 100vw; height: 100vh; }
    #legend {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.85); color: #fff;
      padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px;
      border: 1px solid #333;
    }
    .legend-title { font-weight: bold; margin-bottom: 8px; color: #e9c46a; }
    .legend-item { display: flex; align-items: center; margin: 4px 0; }
    .legend-color { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
    #title {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #fff; font-family: Georgia, serif; font-size: 24px; text-align: center;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }
  </style>
  <script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>
</head>
<body>
  <div id="graph"></div>
  <div id="legend">
    <div class="legend-title">🌳 TREE LAYERS</div>
    <div class="legend-item"><div class="legend-color" style="background:#e9c46a"></div>Crown - Consciousness</div>
    <div class="legend-item"><div class="legend-color" style="background:#2a9d8f"></div>Leaves - Information</div>
    <div class="legend-item"><div class="legend-color" style="background:#f4a261"></div>Branches - Culture</div>
    <div class="legend-item"><div class="legend-color" style="background:#e76f51"></div>Trunk - Governance</div>
    <div class="legend-item"><div class="legend-color" style="background:#264653"></div>Roots - Ecology</div>
  </div>
  <div id="title">🌳 Tree of Civilization</div>
  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    
    const Graph = new ForceGraph3D(document.getElementById('graph'))
      .jsonUrl('../data/unified/tree-of-civilization.json')
      .nodeAutoColorBy('group')
      .nodeLabel('label')
      .linkColor(() => '#ffffff55')
      .linkWidth(2)
      .linkDirectionalArrowLength(5)
      .linkDirectionalArrowRelPos(0.9)
      .backgroundColor('#000000')
      .nodeRelSize(7)
      .nodeThreeObject(node => {
        const obj = new THREE.Mesh(
          new THREE.IcosahedronGeometry(node.val * 0.8, 1),
          new THREE.MeshStandardMaterial({ 
            color: node.color, 
            emissive: node.color,
            emissiveIntensity: 0.3,
            roughness: 0.3,
            metalness: 0.5
          })
        );
        return obj;
      });
    
    // Initial camera position looking up at the tree
    Graph.cameraPosition({ x: 0, y: -300, z: 400 }, { x: 0, y: 0, z: 0 });
  </script>
</body>
</html>
