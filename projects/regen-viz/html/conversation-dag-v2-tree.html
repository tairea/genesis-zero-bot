<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Conversation DAG - Tree Layout</title>
  <style>
    body { margin: 0; background: #0d1117; overflow: hidden; }
    #graph { width: 100vw; height: 100vh; }
    #info {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px;
      font-family: monospace; font-size: 12px; color: #8b949e;
      border: 1px solid #30363d;
    }
    h3 { margin: 0 0 10px 0; color: #58a6ff; font-size: 14px; }
  </style>
  <script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>
</head>
<body>
  <div id="graph"></div>
  <div id="info">
    <h3>🌳 Tree Layout</h3>
    <div>Topics → Actors → Messages</div>
    <div style="margin-top:8px;color:#666;font-size:10px;">
      Uses dagMode for hierarchical layout
    </div>
  </div>
  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    
    // Load conversation data
    const gData = await fetch('../data/unified/conversation-dag.json').then(r => r.json());
    
    const Graph = new ForceGraph3D(document.getElementById('graph'))
      .graphData(gData)
      .backgroundColor('#0d1117')
      .nodeColor(node => node.color || '#58a6ff')
      .nodeLabel('label')
      .nodeRelSize(6)
      .linkColor(() => 'rgba(255,255,255,0.15)')
      .linkWidth(1.5)
      .linkDirectionalArrowLength(4)
      .linkDirectionalArrowRelPos(0.9)
      .dagMode('td')  // top-down tree layout
      .dagLevelDistance(80)
      .onDagError(() => false);
  </script>
</body>
</html>
