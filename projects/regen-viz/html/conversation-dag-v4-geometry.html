<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Conversation DAG - Custom Geometry</title>
  <style>
    body { margin: 0; background: #000000; overflow: hidden; }
    #graph { width: 100vw; height: 100vh; }
    #info {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px;
      font-family: monospace; font-size: 12px; color: #8b949e;
      border: 1px solid #333;
    }
    h3 { margin: 0 0 10px 0; color: #e9c46a; font-size: 14px; }
    .legend { display: flex; gap: 15px; margin-top: 8px; font-size: 10px; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
  </style>
  <script src="//cdn.jsdelivr.net/npm/3d-force-graph"></script>
</head>
<body>
  <div id="graph"></div>
  <div id="info">
    <h3>💎 Custom Geometry</h3>
    <div class="legend">
      <div class="legend-item"><div class="dot" style="background:#e63946"></div>Topic</div>
      <div class="legend-item"><div class="dot" style="background:#58a6ff"></div>Actor</div>
      <div class="legend-item"><div class="dot" style="background:#8b949e"></div>Message</div>
    </div>
  </div>
  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    
    const gData = await fetch('../data/unified/conversation-dag.json').then(r => r.json());
    
    const Graph = new ForceGraph3D(document.getElementById('graph'))
      .graphData(gData)
      .backgroundColor('#000000')
      .nodeLabel('label')
      .linkColor(() => 'rgba(255,255,255,0.1)')
      .linkWidth(1)
      .nodeThreeObject(node => {
        let geometry;
        const size = (node.val || 5) * 0.8;
        
        // Different geometries based on group
        switch (node.group) {
          case 'Topic':
            // Icosahedron for topics (diamond-like)
            geometry = new THREE.IcosahedronGeometry(size, 0);
            break;
          case 'Actor':
            // Box for actors (stable, solid)
            geometry = new THREE.BoxGeometry(size, size, size);
            break;
          case 'Message':
          default:
            // Sphere for messages
            geometry = new THREE.SphereGeometry(size * 0.7, 16, 16);
        }
        
        const material = new THREE.MeshStandardMaterial({
          color: node.color,
          emissive: node.color,
          emissiveIntensity: 0.3,
          roughness: 0.3,
          metalness: 0.7,
          transparent: node.group === 'Message',
          opacity: node.group === 'Message' ? 0.8 : 1
        });
        
        return new THREE.Mesh(geometry, material);
      })
      .nodeRelSize(5);
    
    // Add some ambient lighting
    Graph.scene().add(new THREE.AmbientLight(0x404040, 1));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(100, 100, 100);
    Graph.scene().add(dirLight);
  </script>
</body>
</html>
