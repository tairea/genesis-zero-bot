<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Chain Stories</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        #graph-container { width: 100vw; height: 100vh; }

        /* ── Breadcrumb ─────────────────────────────────── */
        #breadcrumb-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: rgba(10, 10, 15, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            padding: 0 14px;
            z-index: 200;
            backdrop-filter: blur(16px);
            gap: 8px;
            overflow-x: auto;
        }
        #breadcrumb-bar::-webkit-scrollbar { height: 3px; }
        #breadcrumb-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .bc-label {
            font-size: 10px;
            font-weight: 600;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        #breadcrumbs { display: flex; align-items: center; gap: 4px; flex: 1; overflow-x: auto; }
        #breadcrumbs::-webkit-scrollbar { display: none; }
        .breadcrumb-node {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .breadcrumb-node .bc-btn {
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #ccc;
            transition: all 0.15s;
            white-space: nowrap;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .breadcrumb-node .bc-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .breadcrumb-node .bc-btn.active { background: rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.4); color: #00d4ff; }
        .breadcrumb-node .bc-btn.chain-last { background: rgba(0,255,136,0.1); border-color: rgba(0,255,136,0.3); color: #00ff88; }
        .bc-arrow { color: #333; font-size: 12px; flex-shrink: 0; }
        .bc-remove {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: none;
            color: #555;
            font-size: 10px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .bc-remove:hover { background: rgba(255,68,68,0.3); color: #ff4444; }
        .bc-empty { font-size: 12px; color: #333; font-style: italic; }

        /* Share / Export / Clear buttons */
        #toolbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            margin-left: auto;
            padding-left: 12px;
        }
        .toolbar-btn {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #888;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .toolbar-btn:hover { background: rgba(255,255,255,0.09); color: #ccc; }
        .toolbar-btn.primary { border-color: rgba(0,212,255,0.3); color: #00d4ff; }
        .toolbar-btn.primary:hover { background: rgba(0,212,255,0.1); }
        .toolbar-btn.success { border-color: rgba(0,255,136,0.3); color: #00ff88; }
        .toolbar-btn.success:hover { background: rgba(0,255,136,0.1); }

        /* ── Status bar (left, below breadcrumb) ────────── */
        #status-bar {
            position: fixed;
            top: 64px;
            left: 16px;
            background: rgba(12, 12, 20, 0.92);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px 16px;
            z-index: 100;
            backdrop-filter: blur(16px);
            min-width: 160px;
        }
        #status-bar h2 {
            font-size: 10px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            transition: background 0.3s;
        }
        .live-dot.connected { background: #00ff88; box-shadow: 0 0 6px #00ff88; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .stat { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
        .stat .label { color: #555; }
        .stat .value { color: #fff; font-weight: 500; font-variant-numeric: tabular-nums; }

        /* ── Node detail panel (left, when focused) ─────── */
        #node-panel {
            position: fixed;
            top: 64px;
            left: 16px;
            background: rgba(12, 12, 20, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 18px;
            z-index: 100;
            backdrop-filter: blur(16px);
            max-width: 300px;
            width: 300px;
            display: none;
        }
        #node-panel.visible { display: block; }
        #np-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
        #np-name { font-size: 15px; color: #fff; font-weight: 600; flex: 1; word-break: break-word; }
        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #000;
        }
        #np-desc { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 10px; word-break: break-word; }
        .np-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 12px; }
        .np-meta-item { background: rgba(255,255,255,0.03); padding: 5px 7px; border-radius: 4px; }
        .np-meta-item .lbl { color: #444; display: block; font-size: 9px; text-transform: uppercase; }
        .np-meta-item .val { color: #bbb; font-size: 11px; }
        #np-add-btn {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(0,255,136,0.3);
            background: rgba(0,255,136,0.08);
            color: #00ff88;
            transition: all 0.15s;
            margin-bottom: 12px;
        }
        #np-add-btn:hover { background: rgba(0,255,136,0.18); }
        #np-add-btn:disabled { opacity: 0.4; cursor: default; }

        /* Connected nodes list */
        #np-connections h4 {
            font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
        #np-conn-list { max-height: 180px; overflow-y: auto; }
        #np-conn-list::-webkit-scrollbar { width: 3px; }
        #np-conn-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
        .conn-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 12px;
        }
        .conn-item:hover { background: rgba(255,255,255,0.05); }
        .conn-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .conn-verb { font-size: 10px; color: #555; font-style: italic; flex-shrink: 0; }
        .conn-name { color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .conn-extend { font-size: 10px; color: #00ff88; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
        .conn-item:hover .conn-extend { opacity: 1; }

        /* ── Story panel (right side) ───────────────────── */
        #story-panel {
            position: fixed;
            top: 64px;
            right: 16px;
            width: 320px;
            background: rgba(12, 12, 20, 0.95);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px 18px;
            z-index: 100;
            backdrop-filter: blur(16px);
            display: none;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }
        #story-panel.visible { display: block; }
        #story-panel::-webkit-scrollbar { width: 3px; }
        #story-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
        #story-panel h3 { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        #story-content {
            font-size: 13px;
            color: #bbb;
            line-height: 1.7;
            margin-bottom: 14px;
            word-break: break-word;
        }
        #story-content.placeholder { color: #333; font-style: italic; }
        #story-content.generating { color: #555; }
        .story-dots span {
            display: inline-block;
            animation: dot-pulse 1.2s infinite;
        }
        .story-dots span:nth-child(2) { animation-delay: 0.2s; }
        .story-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-pulse { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

        #story-generate-btn {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(155,93,229,0.3);
            background: rgba(155,93,229,0.08);
            color: #9b5de5;
            transition: all 0.15s;
            margin-bottom: 8px;
        }
        #story-generate-btn:hover { background: rgba(155,93,229,0.18); }
        #story-generate-btn:disabled { opacity: 0.4; cursor: default; }

        /* API key settings */
        #api-key-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        #api-key-section h4 { font-size: 10px; color: #333; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        #api-key-input {
            width: 100%;
            padding: 6px 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            color: #888;
            font-size: 11px;
            font-family: monospace;
            outline: none;
            transition: border-color 0.2s;
        }
        #api-key-input:focus { border-color: rgba(155,93,229,0.4); }
        #api-key-input::placeholder { color: #333; }
        #api-key-save {
            margin-top: 6px;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #888;
            transition: all 0.15s;
        }
        #api-key-save:hover { background: rgba(255,255,255,0.09); color: #ccc; }

        /* ── Search ──────────────────────────────────────── */
        #search-box {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        #search-input {
            background: rgba(12, 12, 20, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            color: #fff;
            padding: 8px 18px;
            font-size: 13px;
            width: 280px;
            outline: none;
            backdrop-filter: blur(12px);
            transition: border-color 0.2s;
        }
        #search-input:focus { border-color: rgba(0,212,255,0.5); }
        #search-input::placeholder { color: #444; }

        /* ── Loading ─────────────────────────────────────── */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 12px;
            transition: opacity 0.6s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading span { color: #00d4ff; font-size: 14px; }
        #loading small { color: #333; font-size: 12px; }

        /* ── Toast ───────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(0,255,136,0.15);
            border: 1px solid rgba(0,255,136,0.3);
            color: #00ff88;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="loading">
        <span>Graph Chain Stories</span>
        <small>Connecting to knowledge graph...</small>
    </div>

    <!-- Breadcrumb bar -->
    <div id="breadcrumb-bar">
        <span class="bc-label">Chain</span>
        <div id="breadcrumbs">
            <span class="bc-empty">Click a node to start a chain</span>
        </div>
        <div id="toolbar-right">
            <button class="toolbar-btn" id="clear-chain-btn" title="Clear chain">Clear</button>
            <button class="toolbar-btn primary" id="share-btn" title="Copy share URL">Share</button>
            <button class="toolbar-btn success" id="export-btn" title="Export to Markdown">Export</button>
        </div>
    </div>

    <div id="graph-container"></div>

    <!-- Status bar -->
    <div id="status-bar">
        <h2><span class="live-dot" id="live-dot"></span> Graph</h2>
        <div class="stat"><span class="label">Concepts</span><span class="value" id="node-count">0</span></div>
        <div class="stat"><span class="label">Relations</span><span class="value" id="link-count">0</span></div>
        <div class="stat"><span class="label">Chain</span><span class="value" id="chain-count">0</span></div>
    </div>

    <!-- Node detail panel -->
    <div id="node-panel">
        <div id="np-header">
            <div>
                <div id="np-name">-</div>
                <span class="type-badge" id="np-type">-</span>
            </div>
        </div>
        <p id="np-desc">-</p>
        <div class="np-meta">
            <div class="np-meta-item"><span class="lbl">Rung</span><span class="val" id="np-rung">-</span></div>
            <div class="np-meta-item"><span class="lbl">Confidence</span><span class="val" id="np-conf">-</span></div>
            <div class="np-meta-item"><span class="lbl">Evidence</span><span class="val" id="np-evid">-</span></div>
            <div class="np-meta-item"><span class="lbl">Connections</span><span class="val" id="np-conn">-</span></div>
        </div>
        <button id="np-add-btn">+ Add to Chain</button>
        <div id="np-connections">
            <h4>Connected Nodes</h4>
            <div id="np-conn-list"></div>
        </div>
    </div>

    <!-- Story panel -->
    <div id="story-panel">
        <h3>Chain Story</h3>
        <div id="story-content" class="placeholder">Build a chain of 2+ nodes to generate a story about their connections.</div>
        <button id="story-generate-btn" disabled>Generate Story</button>
        <div id="api-key-section">
            <h4>Anthropic API Key</h4>
            <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
            <button id="api-key-save">Save Key</button>
        </div>
    </div>

    <!-- Search -->
    <div id="search-box">
        <input type="text" id="search-input" placeholder="Search concepts..." autocomplete="off">
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <script>
    (function() {
        // ── Config ───────────────────────────────────────────────────────────
        const WS_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
            ? '__WS_URL__'
            : (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
        const RECONNECT_DELAY = 3000;
        const ANIM_DURATION = 3000; // ms for connection animation after click

        const TYPE_COLORS = {
            entity: '#00d4ff', system: '#ff6b35', process: '#7b2cbf',
            idea: '#2ec4b6', event: '#ffbe0b', person: '#e71d36',
            place: '#06d6a0', attribute: '#9b5de5', quantity: '#f15bb5',
            quality: '#00bbf9', project: '#80ed99', organization: '#ff9f1c',
            skill: '#fdcb6e', resource: '#74b9ff', practice: '#a29bfe',
        };

        // ── State ────────────────────────────────────────────────────────────
        let graph = null;
        let ws = null;
        let graphData = { nodes: [], links: [] };
        let nodeMap = {};
        let connectionCount = {};
        let searchTerm = '';
        let focusedNode = null;       // currently focused/selected node
        let focusedNeighborIds = new Set();  // neighbors of focused node
        let focusedLinkKeys = new Set();     // link keys touching focused node
        let animStartTime = 0;        // when last focus animation started
        let chain = [];               // chain of node IDs
        let currentStory = '';        // last generated story

        // ── URL state restore ────────────────────────────────────────────────
        function parseChainFromURL() {
            const params = new URLSearchParams(location.search);
            const raw = params.get('chain');
            if (raw) return raw.split(',').filter(Boolean);
            return [];
        }

        const pendingChain = parseChainFromURL();

        // ── Toast ────────────────────────────────────────────────────────────
        const toastEl = document.getElementById('toast');
        let toastTimer = null;
        function showToast(msg, duration = 2000) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
        }

        // ── API Key ──────────────────────────────────────────────────────────
        const apiKeyInput = document.getElementById('api-key-input');
        const apiKeySave = document.getElementById('api-key-save');

        function getApiKey() {
            return localStorage.getItem('anthropic_api_key') || '';
        }

        // Init
        const savedKey = getApiKey();
        if (savedKey) apiKeyInput.value = savedKey.slice(0, 8) + '...';

        apiKeySave.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key && !key.endsWith('...')) {
                localStorage.setItem('anthropic_api_key', key);
                apiKeyInput.value = key.slice(0, 8) + '...';
                showToast('API key saved');
            }
        });

        // ── Chain state ──────────────────────────────────────────────────────
        function getChainNodes() {
            return chain.map(id => nodeMap[id]).filter(Boolean);
        }

        function isInChain(nodeId) {
            return chain.includes(nodeId);
        }

        function isConnectedToLastChainNode(nodeId) {
            if (chain.length === 0) return true; // any node can start chain
            const lastId = chain[chain.length - 1];
            return graphData.links.some(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return (s === lastId && t === nodeId) || (t === lastId && s === nodeId);
            });
        }

        function addToChain(nodeId) {
            if (isInChain(nodeId)) return;
            chain.push(nodeId);
            updateChainUI();
            updateStoryPanel();
            showToast(`Added to chain: ${nodeMap[nodeId]?.name || nodeId}`);
        }

        function removeFromChain(nodeId) {
            chain = chain.filter(id => id !== nodeId);
            updateChainUI();
            updateStoryPanel();
        }

        function clearChain() {
            chain = [];
            currentStory = '';
            updateChainUI();
            updateStoryPanel();
        }

        // ── Breadcrumb UI ────────────────────────────────────────────────────
        const breadcrumbsEl = document.getElementById('breadcrumbs');

        function updateChainUI() {
            breadcrumbsEl.innerHTML = '';
            document.getElementById('chain-count').textContent = chain.length;

            if (chain.length === 0) {
                breadcrumbsEl.innerHTML = '<span class="bc-empty">Click a node to start a chain</span>';
                return;
            }

            chain.forEach((id, idx) => {
                const node = nodeMap[id];
                if (!node) return;

                const isLast = idx === chain.length - 1;

                const wrap = document.createElement('div');
                wrap.className = 'breadcrumb-node';

                if (idx > 0) {
                    const arrow = document.createElement('span');
                    arrow.className = 'bc-arrow';
                    arrow.textContent = '→';
                    wrap.appendChild(arrow);
                }

                const btn = document.createElement('button');
                btn.className = 'bc-btn' + (isLast ? ' chain-last' : (id === focusedNode?.id ? ' active' : ''));
                btn.textContent = node.name;
                btn.title = node.name;
                btn.addEventListener('click', () => focusNode(node));
                wrap.appendChild(btn);

                const rmBtn = document.createElement('button');
                rmBtn.className = 'bc-remove';
                rmBtn.textContent = '×';
                rmBtn.title = 'Remove from chain';
                rmBtn.addEventListener('click', (e) => { e.stopPropagation(); removeFromChain(id); });
                wrap.appendChild(rmBtn);

                breadcrumbsEl.appendChild(wrap);
            });

            // Update share URL silently
            const params = new URLSearchParams(location.search);
            if (chain.length > 0) {
                params.set('chain', chain.join(','));
            } else {
                params.delete('chain');
            }
            const newURL = location.pathname + (params.toString() ? '?' + params.toString() : '');
            history.replaceState(null, '', newURL);
        }

        // ── Story panel ──────────────────────────────────────────────────────
        const storyPanel = document.getElementById('story-panel');
        const storyContent = document.getElementById('story-content');
        const storyGenBtn = document.getElementById('story-generate-btn');

        function updateStoryPanel() {
            if (chain.length >= 2) {
                storyPanel.classList.add('visible');
                storyGenBtn.disabled = false;
                if (!currentStory) {
                    storyContent.className = 'placeholder';
                    storyContent.textContent = `Chain of ${chain.length} nodes ready. Click "Generate Story" to create a narrative.`;
                }
            } else if (chain.length === 1) {
                storyPanel.classList.add('visible');
                storyGenBtn.disabled = true;
                storyContent.className = 'placeholder';
                storyContent.textContent = 'Add one more node to the chain to generate a story.';
                currentStory = '';
            } else {
                storyPanel.classList.remove('visible');
                currentStory = '';
            }
        }

        storyGenBtn.addEventListener('click', generateStory);

        async function generateStory() {
            const apiKey = getApiKey();
            if (!apiKey) {
                showToast('Enter your Anthropic API key in the story panel', 3000);
                apiKeyInput.focus();
                return;
            }

            const chainNodes = getChainNodes();
            if (chainNodes.length < 2) return;

            storyGenBtn.disabled = true;
            storyContent.className = 'generating';
            storyContent.innerHTML = 'Generating story<span class="story-dots"><span>.</span><span>.</span><span>.</span></span>';

            // Build the prompt
            const chainDesc = chainNodes.map((node, i) => {
                const links = getNodeLinks(node.id);
                const nextNode = chainNodes[i + 1];
                let relation = '';
                if (nextNode) {
                    const connectingLink = links.find(l => {
                        const s = typeof l.source === 'object' ? l.source.id : l.source;
                        const t = typeof l.target === 'object' ? l.target.id : l.target;
                        return (s === node.id && t === nextNode.id) || (t === node.id && s === nextNode.id);
                    });
                    if (connectingLink) {
                        relation = ` [${connectingLink.verb || 'connects to'}]`;
                    }
                }
                return `${i + 1}. ${node.name} (${node.type})${relation}`;
            }).join('\n');

            const prompt = `You are a knowledge graph storyteller. Given a chain of concepts from a semantic graph, write a brief, insightful narrative (2-3 paragraphs) that explains how these concepts connect and what their relationship reveals about the domain.

Chain of concepts:
${chainDesc}

Write a flowing narrative that traces the conceptual journey from ${chainNodes[0].name} to ${chainNodes[chainNodes.length - 1].name}, explaining the significance of each connection. Be specific and insightful, not generic.`;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                        'anthropic-dangerous-direct-browser-access': 'true',
                    },
                    body: JSON.stringify({
                        model: 'claude-haiku-4-5-20251001',
                        max_tokens: 600,
                        messages: [{ role: 'user', content: prompt }]
                    })
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                currentStory = data.content?.[0]?.text || '';

                storyContent.className = '';
                storyContent.textContent = currentStory;
            } catch (err) {
                storyContent.className = 'placeholder';
                storyContent.textContent = `Error: ${err.message}`;
                showToast('Story generation failed: ' + err.message, 4000);
            } finally {
                storyGenBtn.disabled = false;
            }
        }

        // ── Connection counting ──────────────────────────────────────────────
        function rebuildConnectionCounts() {
            connectionCount = {};
            graphData.links.forEach(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                connectionCount[s] = (connectionCount[s] || 0) + 1;
                connectionCount[t] = (connectionCount[t] || 0) + 1;
            });
        }

        function getNodeLinks(nodeId) {
            return graphData.links.filter(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return s === nodeId || t === nodeId;
            });
        }

        function getNeighborIds(nodeId) {
            const ids = new Set();
            graphData.links.forEach(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                if (s === nodeId) ids.add(t);
                if (t === nodeId) ids.add(s);
            });
            return ids;
        }

        function getLinkKey(l) {
            const s = typeof l.source === 'object' ? l.source.id : l.source;
            const t = typeof l.target === 'object' ? l.target.id : l.target;
            return s + '__' + t;
        }

        // ── Focus a node ─────────────────────────────────────────────────────
        function focusNode(node) {
            focusedNode = node;
            animStartTime = Date.now();

            focusedNeighborIds = getNeighborIds(node.id);
            focusedLinkKeys = new Set();
            graphData.links.forEach(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                if (s === node.id || t === node.id) {
                    focusedLinkKeys.add(getLinkKey(l));
                }
            });

            // Camera movement
            const distance = 60;
            if (graph) {
                graph.cameraPosition(
                    { x: node.x + distance, y: node.y + distance / 2, z: node.z + distance },
                    node, 1200
                );
            }

            updateNodePanel(node);
            updateBreadcrumbActiveState();

            // Force graph refresh
            if (graph) {
                graph.nodeColor(graph.nodeColor());
                graph.nodeVal(graph.nodeVal());
                graph.linkColor(graph.linkColor());
                graph.linkWidth(graph.linkWidth());
                graph.linkDirectionalParticles(graph.linkDirectionalParticles());
            }
        }

        function updateBreadcrumbActiveState() {
            // Update breadcrumb active state
            breadcrumbsEl.querySelectorAll('.bc-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (focusedNode) {
                chain.forEach((id, idx) => {
                    if (id === focusedNode.id) {
                        const isLast = idx === chain.length - 1;
                        const btns = breadcrumbsEl.querySelectorAll('.bc-btn');
                        if (btns[idx] && !isLast) btns[idx].classList.add('active');
                    }
                });
            }
        }

        // ── Node detail panel ────────────────────────────────────────────────
        const nodePanel = document.getElementById('node-panel');
        const statusBar = document.getElementById('status-bar');

        function updateNodePanel(node) {
            // Hide status bar when node panel is visible
            nodePanel.classList.add('visible');
            statusBar.style.display = 'none';

            document.getElementById('np-name').textContent = node.name;
            const badge = document.getElementById('np-type');
            badge.textContent = node.type;
            badge.style.background = TYPE_COLORS[node.type] || '#666';
            document.getElementById('np-desc').textContent = node.description || 'No description';
            document.getElementById('np-rung').textContent = 'R' + (node.rung || 0);
            document.getElementById('np-conf').textContent = (node.nars_confidence || 0).toFixed(2);
            document.getElementById('np-evid').textContent = node.evidence_count || 0;
            document.getElementById('np-conn').textContent = connectionCount[node.id] || 0;

            // Add to chain button
            const addBtn = document.getElementById('np-add-btn');
            if (isInChain(node.id)) {
                addBtn.textContent = '✓ In Chain';
                addBtn.disabled = true;
            } else {
                const canExtend = isConnectedToLastChainNode(node.id);
                addBtn.textContent = chain.length === 0 ? '+ Start Chain' :
                    (canExtend ? '+ Extend Chain →' : '+ Add to Chain');
                addBtn.disabled = false;
            }

            // Connected nodes list
            const connList = document.getElementById('np-conn-list');
            connList.innerHTML = '';

            const links = getNodeLinks(node.id);
            // Sort: connected to last chain node first
            const lastId = chain.length > 0 ? chain[chain.length - 1] : null;
            links.sort((a, b) => {
                const aId = (typeof a.source === 'object' ? a.source.id : a.source) === node.id
                    ? (typeof a.target === 'object' ? a.target.id : a.target)
                    : (typeof a.source === 'object' ? a.source.id : a.source);
                const bId = (typeof b.source === 'object' ? b.source.id : b.source) === node.id
                    ? (typeof b.target === 'object' ? b.target.id : b.target)
                    : (typeof b.source === 'object' ? b.source.id : b.source);
                // Chain-connectable first
                if (lastId) {
                    const aConn = aId === lastId ? -1 : 0;
                    const bConn = bId === lastId ? -1 : 0;
                    if (aConn !== bConn) return aConn - bConn;
                }
                return 0;
            });

            links.slice(0, 20).forEach(link => {
                const srcId = typeof link.source === 'object' ? link.source.id : link.source;
                const tgtId = typeof link.target === 'object' ? link.target.id : link.target;
                const neighborId = srcId === node.id ? tgtId : srcId;
                const neighbor = nodeMap[neighborId];
                if (!neighbor) return;

                const isOutgoing = srcId === node.id;
                const verb = link.verb || '—';

                const item = document.createElement('div');
                item.className = 'conn-item';

                const dot = document.createElement('span');
                dot.className = 'conn-dot';
                dot.style.background = TYPE_COLORS[neighbor.type] || '#666';
                item.appendChild(dot);

                const verbEl = document.createElement('span');
                verbEl.className = 'conn-verb';
                verbEl.textContent = (isOutgoing ? '→' : '←') + verb;
                item.appendChild(verbEl);

                const nameEl = document.createElement('span');
                nameEl.className = 'conn-name';
                nameEl.textContent = neighbor.name;
                item.appendChild(nameEl);

                const extendEl = document.createElement('span');
                extendEl.className = 'conn-extend';
                extendEl.textContent = isInChain(neighborId) ? '✓' : '+chain';
                item.appendChild(extendEl);

                item.addEventListener('click', () => {
                    focusNode(neighbor);
                    if (!isInChain(neighborId)) addToChain(neighborId);
                });

                connList.appendChild(item);
            });

            if (links.length === 0) {
                connList.innerHTML = '<div style="font-size:11px;color:#333;padding:6px 0">No connections</div>';
            }
        }

        // Add to chain button handler
        document.getElementById('np-add-btn').addEventListener('click', () => {
            if (focusedNode && !isInChain(focusedNode.id)) {
                addToChain(focusedNode.id);
                updateNodePanel(focusedNode);
            }
        });

        // ── Toolbar actions ───────────────────────────────────────────────────
        document.getElementById('clear-chain-btn').addEventListener('click', () => {
            clearChain();
            if (focusedNode) updateNodePanel(focusedNode);
        });

        document.getElementById('share-btn').addEventListener('click', () => {
            const url = location.href;
            navigator.clipboard.writeText(url).then(
                () => showToast('URL copied to clipboard!'),
                () => {
                    // Fallback: show URL
                    prompt('Copy this URL:', url);
                }
            );
        });

        document.getElementById('export-btn').addEventListener('click', exportMarkdown);

        function exportMarkdown() {
            const chainNodes = getChainNodes();
            if (chainNodes.length === 0) {
                showToast('No chain to export');
                return;
            }

            const lines = [];
            lines.push('# Graph Chain Story');
            lines.push('');
            lines.push(`Generated: ${new Date().toISOString()}`);
            lines.push('');

            // Chain summary
            lines.push('## Chain');
            lines.push('');
            lines.push(chainNodes.map(n => n.name).join(' → '));
            lines.push('');

            // Node details
            lines.push('## Nodes');
            lines.push('');
            chainNodes.forEach((node, idx) => {
                lines.push(`### ${idx + 1}. ${node.name}`);
                lines.push('');
                lines.push(`**Type:** ${node.type}  `);
                lines.push(`**Rung:** R${node.rung || 0}  `);
                lines.push(`**Confidence:** ${(node.nars_confidence || 0).toFixed(2)}  `);
                lines.push(`**Evidence:** ${node.evidence_count || 0}  `);
                lines.push('');
                if (node.description) {
                    lines.push(node.description);
                    lines.push('');
                }

                // Connection to next
                if (idx < chainNodes.length - 1) {
                    const nextNode = chainNodes[idx + 1];
                    const connectingLink = graphData.links.find(l => {
                        const s = typeof l.source === 'object' ? l.source.id : l.source;
                        const t = typeof l.target === 'object' ? l.target.id : l.target;
                        return (s === node.id && t === nextNode.id) || (t === node.id && s === nextNode.id);
                    });
                    if (connectingLink) {
                        lines.push(`*Relation to next: **${connectingLink.verb || 'connects to'}** (confidence: ${(connectingLink.nars_confidence || 0).toFixed(2)})*`);
                        lines.push('');
                    }
                }
            });

            // Story
            if (currentStory) {
                lines.push('## Story');
                lines.push('');
                lines.push(currentStory);
                lines.push('');
            }

            // Graph URL
            lines.push('---');
            lines.push(`*Source: [Graph Chain Stories](${location.href})*`);

            const md = lines.join('\n');
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chain-story-${Date.now()}.md`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported to Markdown');
        }

        // ── Search ───────────────────────────────────────────────────────────
        document.getElementById('search-input').addEventListener('input', e => {
            searchTerm = e.target.value.toLowerCase().trim();
            if (graph) {
                graph.nodeColor(graph.nodeColor());
                graph.nodeVal(graph.nodeVal());
                graph.linkColor(graph.linkColor());
                graph.linkWidth(graph.linkWidth());
            }
        });

        // ── Node visibility ──────────────────────────────────────────────────
        function isNodeVisible(node) {
            if (searchTerm && !node.name.toLowerCase().includes(searchTerm)) return false;
            return true;
        }

        function getNodeOpacity(node) {
            if (!focusedNode) return 1.0;
            if (node.id === focusedNode.id) return 1.0;
            if (focusedNeighborIds.has(node.id)) return 0.9;
            return 0.08;
        }

        function getLinkOpacity(link) {
            const key = getLinkKey(link);
            if (!focusedNode) return 0.35;
            if (focusedLinkKeys.has(key)) return 0.9;
            return 0.03;
        }

        function nodeColor(node) {
            if (!isNodeVisible(node)) return 'rgba(30,30,40,0.2)';
            const baseColor = TYPE_COLORS[node.type] || '#ffffff';
            const opacity = getNodeOpacity(node);

            if (node.id === focusedNode?.id) {
                // Focused: bright white glow
                return '#ffffff';
            }
            if (focusedNode && focusedNeighborIds.has(node.id)) {
                // Neighbor: full color
                return baseColor;
            }
            if (isInChain(node.id)) {
                // In chain: slightly highlight
                return baseColor;
            }
            if (!isNodeVisible(node) || (focusedNode && !focusedNeighborIds.has(node.id))) {
                return `rgba(40,40,55,${opacity > 0.05 ? 0.3 : 0.1})`;
            }
            return baseColor;
        }

        function nodeVal(node) {
            const base = Math.max(2, Math.sqrt(node.evidence_count || 1) * 2.5);
            if (!isNodeVisible(node)) return base * 0.2;
            if (node.id === focusedNode?.id) return base * 2.5;
            if (focusedNode && focusedNeighborIds.has(node.id)) return base * 1.4;
            if (focusedNode) return base * 0.3;
            if (isInChain(node.id)) return base * 1.3;
            return base;
        }

        function linkColor(link) {
            const op = getLinkOpacity(link);
            const key = getLinkKey(link);
            if (focusedNode && focusedLinkKeys.has(key)) {
                // Animate: pulse color
                const elapsed = Date.now() - animStartTime;
                const pulse = 0.5 + 0.5 * Math.sin(elapsed / 300);
                return `rgba(0, ${Math.round(180 + 75 * pulse)}, ${Math.round(100 + 100 * pulse)}, ${op})`;
            }
            return `rgba(80, 80, 100, ${op})`;
        }

        function linkWidth(link) {
            const key = getLinkKey(link);
            if (focusedNode && focusedLinkKeys.has(key)) return 2;
            if (focusedNode) return 0.1;
            return Math.max(0.3, (link.nars_confidence || 0.5) * 1.5);
        }

        function linkParticles(link) {
            const key = getLinkKey(link);
            if (focusedNode && focusedLinkKeys.has(key)) return 4;
            return 0;
        }

        // ── Init graph ───────────────────────────────────────────────────────
        function initGraph() {
            graph = ForceGraph3D()(document.getElementById('graph-container'))
                .backgroundColor('#0a0a0f')
                .nodeResolution(12)
                .linkResolution(4)
                .nodeColor(nodeColor)
                .nodeVal(nodeVal)
                .nodeOpacity(0.92)
                .nodeLabel('')
                .linkWidth(linkWidth)
                .linkColor(linkColor)
                .linkOpacity(0.7)
                .linkDirectionalArrowLength(3)
                .linkDirectionalArrowRelPos(0.95)
                .linkDirectionalParticles(linkParticles)
                .linkDirectionalParticleWidth(2)
                .linkDirectionalParticleSpeed(0.01)
                .linkDirectionalParticleColor(() => '#00ffaa')
                .onNodeClick(node => {
                    focusNode(node);
                })
                .onBackgroundClick(() => {
                    // Deselect / restore view
                    focusedNode = null;
                    focusedNeighborIds = new Set();
                    focusedLinkKeys = new Set();
                    nodePanel.classList.remove('visible');
                    statusBar.style.display = '';
                    if (graph) {
                        graph.nodeColor(graph.nodeColor());
                        graph.nodeVal(graph.nodeVal());
                        graph.linkColor(graph.linkColor());
                        graph.linkWidth(graph.linkWidth());
                        graph.linkDirectionalParticles(graph.linkDirectionalParticles());
                    }
                });

            // Animation loop for pulsing connections
            setInterval(() => {
                if (focusedNode && graph) {
                    graph.nodeColor(graph.nodeColor());
                    graph.linkColor(graph.linkColor());
                    graph.linkDirectionalParticles(graph.linkDirectionalParticles());
                }
            }, 100);
        }

        // ── WebSocket ────────────────────────────────────────────────────────
        function connect() {
            ws = new WebSocket(WS_URL);
            const dot = document.getElementById('live-dot');

            ws.onopen = () => { dot.classList.add('connected'); };
            ws.onclose = () => {
                dot.classList.remove('connected');
                setTimeout(connect, RECONNECT_DELAY);
            };
            ws.onerror = () => ws.close();

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'init') {
                    graphData.nodes = msg.nodes;
                    graphData.links = msg.links;

                    nodeMap = {};
                    msg.nodes.forEach(n => nodeMap[n.id] = n);
                    rebuildConnectionCounts();

                    if (!graph) initGraph();
                    graph.graphData(graphData);

                    document.getElementById('node-count').textContent = graphData.nodes.length;
                    document.getElementById('link-count').textContent = graphData.links.length;
                    document.getElementById('loading').classList.add('hidden');

                    setTimeout(() => graph.zoomToFit(1500), 800);

                    // Restore chain from URL
                    if (pendingChain.length > 0) {
                        pendingChain.forEach(id => {
                            if (nodeMap[id]) chain.push(id);
                        });
                        updateChainUI();
                        updateStoryPanel();
                        // Focus last chain node
                        if (chain.length > 0) {
                            const lastNode = nodeMap[chain[chain.length - 1]];
                            if (lastNode) setTimeout(() => focusNode(lastNode), 1500);
                        }
                    }
                }

                else if (msg.type === 'node') {
                    const node = msg.node;
                    if (nodeMap[node.id]) return;
                    nodeMap[node.id] = node;
                    graphData.nodes.push(node);
                    graph.graphData(graphData);
                    document.getElementById('node-count').textContent = graphData.nodes.length;
                }

                else if (msg.type === 'link') {
                    connectionCount[msg.link.source] = (connectionCount[msg.link.source] || 0) + 1;
                    connectionCount[msg.link.target] = (connectionCount[msg.link.target] || 0) + 1;
                    graphData.links.push(msg.link);
                    graph.graphData(graphData);
                    document.getElementById('link-count').textContent = graphData.links.length;
                }
            };
        }

        // ── Start ────────────────────────────────────────────────────────────
        connect();
    })();
    </script>
</body>
</html>
