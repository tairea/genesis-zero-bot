<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Graph Visualization </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }
        
        #graph-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px 20px;
            max-width: 320px;
            z-index: 100;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        #info-panel h2 {
            font-size: 14px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        #info-panel .stat {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        #info-panel .stat:last-child {
            border-bottom: none;
        }
        
        #info-panel .label {
            color: #666;
            font-size: 13px;
        }
        
        #info-panel .value {
            color: #fff;
            font-weight: 500;
            font-size: 13px;
        }
        
        #node-details {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.95);
            border: 1px solid rgba(, 255, 0.1255, 255);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            z-index: 100;
            display: none;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        #node-details.visible {
            display: block;
        }
        
        #node-details h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #fff;
        }
        
        #node-details .type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        #node-details p {
            font-size: 13px;
            line-height: 1.6;
            color: #aaa;
            margin-bottom: 12px;
        }
        
        #node-details .meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 12px;
        }
        
        #node-details .meta-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 10px;
            border-radius: 6px;
        }
        
        #node-details .meta-item .label {
            color: #666;
            display: block;
            margin-bottom: 2px;
        }
        
        #node-details .meta-item .val {
            color: #fff;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(15, 15, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        
        #controls label {
            display: block;
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        
        #controls select, #controls input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #fff;
            padding: 8px 12px;
            font-size: 13px;
            margin-bottom: 12px;
            width: 140px;
        }
        
        #controls select:focus, #controls input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        #controls button {
            background: linear-gradient(135deg, #2ec4b6, #00d4ff);
            border: none;
            border-radius: 6px;
            color: #000;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #controls button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(46, 196, 182, 0.3);
        }
        
        .legend {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            z-index: 100;
            backdrop-filter: blur(12px);
            font-size: 11px;
        }
        
        .legend h4 {
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            font-size: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 10px 24px;
            font-size: 12px;
            color: #666;
            z-index: 50;
            backdrop-filter: blur(8px);
        }
        
        .instructions kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: inherit;
            color: #888;
        }
    </style>
</head>

    <div id="info-panel">

    <div id="node-details">

        <span class="type-badge" id="detail-type">-</span>
        <p id="detail-description">-</p>
        <div class="meta">
            <div class="meta-item">

        </div>
    </div>
    
    <div class="legend">
        <h4>Node Types</h4>
        <div class="legend-item"><span class="legend-color" style="background:#00d4ff"></span>Entity</div>
        <div class="legend-item"><span class="legend-color" style="background:#ff6b35"></span>System</div>
        <div class="legend-item"><span class="legend-color" style="background:#7b2cbf"></span>Process</div>
        <div class="legend-item"><span class="legend-color" style="background:#2ec4b6"></span>Idea</div>
        <div class="legend-item"><span class="legend-color" style="background:#ffbe0b"></span>Event</div>
    </div>
    
    <div id="controls">
        <label>Focus Depth</label>
        <select id="depth-select">
            <option value="1">1 hop</option>
            <option value="2" selected>2 hops</option>
            <option value="3">3 hops</option>
            <option value="4">4 hops</option>
            <option value="5">5 hops</option>
        </select>
        <label>Node Size</label>
        <select id="size-select">
            <option value="evidence" selected>Evidence Count</option>
            <option value="confidence">Confidence</option>
            <option value="fixed">Fixed</option>
        </select>
        <button id="reset-camera">Reset View</button>
    </div>
    
    <div class="instructions">
        <kbd>Click</kbd> node to focus · <kbd>Scroll</kbd> zoom · <kbd>Drag</kbd> rotate · <kbd>WASD</kbd> fly
    </div>

                24, 24
            );
            const material = new THREE.MeshPhongMaterial({
                color: typeColors[node.type] || '#ffffff',
                transparent: true,
                opacity: 0.9,
                shininess: 80
            });
            const sphere = new THREE.Mesh(geometry, material);
            group.add(sphere);
            
            // Glow for focused
            if (node.id === focusedNodeId) {
                const glowGeo = new THREE.SphereGeometry(
                    Math.max(2, Math.sqrt(node.evidence_count) * 2.2), 
                    24, 24
                );
                const glowMat = new THREE.MeshBasicMaterial({
                    color: typeColors[node.type] || '#ffffff',
                    transparent: true,
                    opacity: 0.15
                });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                group.add(glow);
            }
            
            // Label sprite
            const labelCanvas = document.createElement('canvas');
            const ctx = labelCanvas.getContext('2d');
            labelCanvas.width = 256;
            labelCanvas.height = 64;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.roundRect(0, 0, 256, 64, 8);
            ctx.fill();
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const name = node.name.length > 28 ? node.name.substring(0, 25) + '...' : node.name;
            ctx.fillText(name, 128, 32);
            
            const texture = new THREE.CanvasTexture(labelCanvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const labelSprite = new THREE.Sprite(spriteMat);
            labelSprite.scale.set(20, 5, 1);
            labelSprite.position.y = Math.max(2, Math.sqrt(node.evidence_count) * 2.5);
            group.add(labelSprite);
            
            return group;
        });
        
        // Focus on node
        function focusNode(node) {
            focusedNodeId = node.id;
            
            // Update details panel
            document.getElementById('node-details').classList.add('visible');
            document.getElementById('detail-name').textContent = node.name;
            document.getElementById('detail-type').textContent = node.type;
            document.getElementById('detail-type').style.background = typeColors[node.type] || '#666';
            document.getElementById('detail-type').style.color = '#000';
            document.getElementById('detail-description').textContent = node.description || 'No description';
            document.getElementById('detail-rung').textContent = 'R' + (node.rung || 0);
            document.getElementById('detail-confidence').textContent = (node.nars_confidence || 0).toFixed(2);
            document.getElementById('detail-evidence').textContent = node.evidence_count || 0;
            document.getElementById('detail-frequency').textContent = (node.nars_frequency || 0).toFixed(2);
            
            // Animate camera to node
            const distance = 80;
            const cameraPosition = {
                x: node.x + distance,
                y: node.y + distance / 2,
                z: node.z + distance
            };
            
            g3d.cameraPosition(cameraPosition, node, 1500);
            
            // Dim unfocused nodes
            g3d.nodeOpacity(node => {
                if (!focusedNodeId) return 1;
                if (node.id === focusedNodeId) return 1;
                // Check if connected
                const isConnected = graphData.links.some(l => 
                    l.source.id === node.id || l.target.id === node.id ||
                    l.source === node.id || l.target === node.id
                );
                return isConnected ? 0.8 : 0.15;
            });
            
            // Highlight connected links
            g3d.linkOpacity(link => {
                if (!focusedNodeId) return 0.4;
                if (link.source.id === focusedNodeId || link.target.id === focusedNodeId ||
                    link.source === focusedNodeId || link.target === focusedNodeId) {
                    return 0.9;
                }
                return 0.08;
            });
            
            g3d.linkWidth(link => {
                if (!focusedNodeId) return Math.max(0.3, link.weight * 2);
                if (link.source.id === focusedNodeId || link.target.id === focusedNodeId ||
                    link.source === focusedNodeId || link.target === focusedNodeId) {
                    return Math.max(1, link.weight * 4);
                }
                return 0.3;
            });
        }
        
        function unfocusAll() {
            focusedNodeId = null;
            document.getElementById('node-details').classList.remove('visible');
            
            g3d.nodeOpacity(1);
            g3d.linkOpacity(0.4);
            g3d.linkWidth(link => Math.max(0.3, link.weight * 2));
        }
        
        // Update stats
        document.getElementById('node-count').textContent = graphData.nodes.length;
        document.getElementById('link-count').textContent = graphData.links.length;
        
        // Controls
        document.getElementById('reset-camera').addEventListener('click', () => {
            unfocusAll();
            g3d.zoomToFit(1000);
        });
        
        // Size selector
        document.getElementById('size-select').addEventListener('change', (e) => {
            const mode = e.target.value;
            g3d.nodeVal(node => {
                if (mode === 'evidence') return Math.max(2, Math.sqrt(node.evidence_count) * 3);
                if (mode === 'confidence') return Math.max(2, node.nars_confidence * 15);
                return 5;
            });
        });
        
        // Keyboard controls for first-person fly
        const camera = g3d.camera();
        const velocity = { x: 0, y: 0, z: 0 };
        const speed = 0.5;
        const keys = {};
        
        document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        
        function updateCamera() {
            if (keys['w']) velocity.z -= speed;
            if (keys['s']) velocity.z += speed;
            if (keys['a']) velocity.x -= speed;
            if (keys['d']) velocity.x += speed;
            if (keys['q']) velocity.y -= speed;
            if (keys['e']) velocity.y += speed;
            
            camera.position.x += velocity.x;
            camera.position.y += velocity.y;
            camera.position.z += velocity.z;
            
            velocity.x *= 0.9;
            velocity.y *= 0.9;
            velocity.z *= 0.9;
            
            requestAnimationFrame(updateCamera);
        }
        updateCamera();
        
        // Initial zoom to fit
        setTimeout(() => {
            g3d.zoomToFit(1500);
        }, 1000);
    </script>
</body>
</html>
