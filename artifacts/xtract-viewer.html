<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>XTRACT Graph Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font: 12px system-ui, sans-serif; 
            background: #0d1117; 
            color: #c9d1d9;
            overflow: hidden;
        }
        #container { 
            width: 100vw; 
            height: 100vh; 
            position: relative;
        }
        canvas { display: block; }
        
        /* UI panels */
        .panel {
            position: fixed;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        
        #stats { top: 12px; left: 12px; min-width: 140px; }
        #legend { top: 12px; right: 12px; font-size: 11px; }
        #tooltip { 
            display: none; 
            position: fixed; 
            max-width: 280px;
            z-index: 200;
            pointer-events: none;
        }
        #tooltip.visible { display: block; }
        #tooltip h4 { 
            color: #58a6ff; 
            margin-bottom: 4px; 
            font-size: 13px;
            word-break: break-word;
        }
        #tooltip .type { 
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            margin-bottom: 6px;
        }
meta { 
                   #tooltip . font-size: 10px; 
            color: #8b949e;
            line-height: 1.4;
        }
        
        #loading {
            position: fixed;
            inset: 0;
            background: #0d1117;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        
        .legend-item { display: flex; align-items: center; margin-bottom: 4px; }
        .legend-color { 
            width: 8px; height: 8px; 
            border-radius: 50%; 
            margin-right: 6px; 
        }
        
        .stat { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .stat .label { color: #8b949e; }
        .stat .val { color: #c9d1d9; font-weight: 500; }
        
        kbd {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 3px;
            padding: 1px 4px;
            font-size: 10px;
        }
        #help {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div id="loading"><span>Loading graph...</span></div>
    
    <div id="container"><canvas id="canvas"></canvas></div>
    
    <div id="stats" class="panel">
        <div class="stat"><span class="label">Nodes</span><span class="val" id="node-count">0</span></div>
        <div class="stat"><span class="label">Edges</span><span class="val" id="edge-count">0</span></div>
    </div>
    
    <div id="legend" class="panel">
        <div class="legend-item"><span class="legend-color" style="background:#58a6ff"></span>Entity</div>
        <div class="legend-item"><span class="legend-color" style="background:#f78166"></span>System</div>
        <div class="legend-item"><span class="legend-color" style="background:#a371f7"></span>Process</div>
        <div class="legend-item"><span class="legend-color" style="background:#3fb950"></span>Idea</div>
        <div class="legend-item"><span class="legend-color" style="background:#f0883e"></span>Event</div>
    </div>
    
    <div id="tooltip" class="panel">
        <h4 id="tt-name"></h4>
        <span class="type" id="tt-type"></span>
        <div class="meta" id="tt-meta"></div>
    </div>
    
    <div id="help"><kbd>Scroll</kbd> zoom · <kbd>Drag</kbd> pan · <kbd>Hover</kbd> details</div>

    <script src="https://cdn.jsdelivr.net/npm/surrealdb@1.0.8/+esm"></script>
    <script type="module">
        // Config
        const SURREAL_URL = "ws://127.0.0.1:8000";
        const SURREAL_NS = "xtract_graph";
        const SURREAL_DB = "main";
        
        const COLORS = {
            entity: "#58a6ff",
            system: "#f78166",
            process: "#a371f7",
            idea: "#3fb950",
            event: "#f0883e",
            attribute: "#db61a2",
            person: "#f778ba",
            place: "#7ee787",
            default: "#8b949e"
        };
        
        // State
        let nodes = [];
        let links = [];
        let nodeMap = new Map();
        
        // Canvas
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        
        // View
        let view = { x: 0, y: 0, scale: 0.4 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let hoveredNode = null;
        
        // Resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }
        window.addEventListener("resize", resize);
        resize();
        
        // Load data
        async function loadGraph() {
            const db = await Surreal.connect(SURREAL_URL);
            await db.signin({ username: "root", password: "DLkelAlX8ucXPRUKBVPh5dYp9xZ5Y+IZ" });
            await db.use(SURREAL_NS, SURREAL_DB);
            
            // Get concepts
            const concepts = await db.query("SELECT * FROM concept");
            nodes = concepts.map(c => ({
                id: c.id?.record_id || c.name,
                name: c.name,
                type: c.type || "entity",
                fingerprint: c.fingerprint,
                nars_confidence: c.nars_confidence || 0.5,
                evidence_count: c.evidence_count || 1
            }));
            
            // Get relations
            const rels = await db.query("SELECT verb, in, out FROM relates");
            links = rels.map(r => ({
                verb: r.verb,
                source: r.in?.record_id,
                target: r.out?.record_id
            })).filter(l => l.source && l.target);
            
            // Build map
            nodes.forEach(n => nodeMap.set(n.id, n));
            
            // Center view
            centerGraph();
            
            document.getElementById("node-count").textContent = nodes.length;
            document.getElementById("edge-count").textContent = links.length;
            document.getElementById("loading").classList.add("hidden");
            
            await db.close();
        }
        
        function centerGraph() {
            if (!nodes.length) return;
            
            // Simple force layout
            const iterations = 100;
            const width = canvas.width;
            const height = canvas.height;
            
            // Random positions
            nodes.forEach(n => {
                n.x = Math.random() * width * 2 - width;
                n.y = Math.random() * height * 2 - height;
            });
            
            // Force simulation
            for (let i = 0; i < iterations; i++) {
                // Repulsion
                for (let a of nodes) {
                    for (let b of nodes) {
                        if (a === b) continue;
                        let dx = a.x - b.x;
                        let dy = a.y - b.y;
                        let d = Math.sqrt(dx*dx + dy*dy) || 1;
                        let force = 5000 / (d * d);
                        a.vx = (a.vx || 0) + dx / d * force;
                        a.vy = (a.vy || 0) + dy / d * force;
                    }
                }
                
                // Attraction
                for (let l of links) {
                    let s = nodeMap.get(l.source);
                    let t = nodeMap.get(l.target);
                    if (!s || !t) continue;
                    let dx = t.x - s.x;
                    let dy = t.y - s.y;
                    let d = Math.sqrt(dx*dx + dy*dy) || 1;
                    let force = d * 0.01;
                    s.vx = (s.vx || 0) + dx / d * force;
                    s.vy = (s.vy || 0) + dy / d * force;
                    t.vx = (t.vx || 0) - dx / d * force;
                    t.vy = (t.vy || 0) - dy / d * force;
                }
                
                // Apply
                for (let n of nodes) {
                    n.x += n.vx || 0;
                    n.y += n.vy || 0;
                    n.vx = (n.vx || 0) * 0.9;
                    n.vy = (n.vy || 0) * 0.9;
                }
            }
            
            // Center
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (let n of nodes) {
                minX = Math.min(minX, n.x);
                minY = Math.min(minY, n.y);
                maxX = Math.max(maxX, n.x);
                maxY = Math.max(maxY, n.y);
            }
            let cx = (minX + maxX) / 2;
            let cy = (minY + maxY) / 2;
            view.x = canvas.width / 2 - cx;
            view.y = canvas.height / 2 - cy;
        }
        
        // Render
        function render() {
            ctx.fillStyle = "#0d1117";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(view.x, view.y);
            ctx.scale(view.scale, view.scale);
            
            // Links
            ctx.strokeStyle = "#30363d";
            ctx.lineWidth = 1 / view.scale;
            for (let l of links) {
                let s = nodeMap.get(l.source);
                let t = nodeMap.get(l.target);
                if (!s || !t) continue;
                
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(t.x, t.y);
                ctx.stroke();
            }
            
            // Nodes
            for (let n of nodes) {
                let color = COLORS[n.type] || COLORS.default;
                let r = 4 + Math.sqrt(n.evidence_count || 1) * 2;
                
                // Highlight on hover
                if (n === hoveredNode) {
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, r * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Node
                ctx.fillStyle = color;
                ctx.globalAlpha = n === hoveredNode ? 1 : 0.8;
                ctx.beginPath();
                ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                // Label (only if large enough)
                if (view.scale > 0.15) {
                    ctx.fillStyle = "#c9d1d9";
                    ctx.font = `${10 / view.scale}px system-ui`;
                    ctx.textAlign = "center";
                    ctx.fillText(n.name.substring(0, 20), n.x, n.y + r + 12 / view.scale);
                }
            }
            
            ctx.restore();
        }
        
        // Events
        canvas.addEventListener("wheel", e => {
            e.preventDefault();
            let delta = e.deltaY > 0 ? 0.9 : 1.1;
            view.scale *= delta;
            view.scale = Math.max(0.05, Math.min(3, view.scale));
            render();
        });
        
        canvas.addEventListener("mousedown", e => {
            isDragging = true;
            dragStart = { x: e.clientX - view.x, y: e.clientY - view.y };
        });
        
        canvas.addEventListener("mousemove", e => {
            // Hover detection
            let mx = (e.clientX - view.x) / view.scale;
            let my = (e.clientY - view.y) / view.scale;
            
            hoveredNode = null;
            for (let n of nodes) {
                let dx = mx - n.x;
                let dy = my - n.y;
                let r = 4 + Math.sqrt(n.evidence_count || 1) * 2;
                if (dx*dx + dy*dy < r*r) {
                    hoveredNode = n;
                    break;
                }
            }
            
            if (hoveredNode) {
                const tt = document.getElementById("tooltip");
                tt.classList.add("visible");
                tt.style.left = (e.clientX + 15) + "px";
                tt.style.top = (e.clientY + 15) + "px";
                
                document.getElementById("tt-name").textContent = hoveredNode.name;
                const typeEl = document.getElementById("tt-type");
                typeEl.textContent = hoveredNode.type;
                typeEl.style.background = COLORS[hoveredNode.type] || COLORS.default;
                typeEl.style.color = "#000";
                
                document.getElementById("tt-meta").innerHTML = `
                    Confidence: ${(hoveredNode.nars_confidence || 0).toFixed(2)}<br>
                    Evidence: ${hoveredNode.evidence_count || 1}
                `;
            } else {
                document.getElementById("tooltip").classList.remove("visible");
            }
            
            // Drag
            if (isDragging) {
                view.x = e.clientX - dragStart.x;
                view.y = e.clientY - dragStart.y;
            }
            
            render();
        });
        
        canvas.addEventListener("mouseup", () => isDragging = false);
        canvas.addEventListener("mouseleave", () => {
            isDragging = false;
            hoveredNode = null;
            document.getElementById("tooltip").classList.remove("visible");
            render();
        });
        
        // Start
        loadGraph().catch(e => {
            console.error(e);
            document.getElementById("loading").innerHTML = 
                `<span style="color:#f85149">Error: ${e.message}</span>`;
        });
    </script>
</body>
</html>
